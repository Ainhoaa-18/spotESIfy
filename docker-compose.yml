# ============================================================================
# SpotESIfy — Docker Compose
# SSOO II · Escuela Superior de Informática · UCLM
# ============================================================================
# Un clon simplificado de Spotify con 4 servicios.
# Levanta con: docker compose up -d
# ============================================================================

services:

  # ── Nginx: Proxy inverso (puerta de entrada) ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: spotesify-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web 
      - api
    networks:
      - frontend
    restart: unless-stopped

  # ── Web: Frontend (HTML/CSS/JS) ──────────────────────────────────────────
  web:
    build: ./web
    container_name: spotesify-web
    ports:
      - "3000:3000"
    networks:
      - frontend
    restart: unless-stopped
    depends_on: #arranque resiliente E9
      db:
        condition: service_healthy


  # ── API: Backend Express.js ──────────────────────────────────────────────
  api:
    build: ./api
    container_name: spotesify-api
    environment:
      - PORT=5000
      - REDIS_HOST=db
      - REDIS_PORT=6379
      - REDIS_PASS=spotesify123 #arreglo nombre variable para evitar conflicto
      - MUSIC_DIR=/music #arreglo para E4
    volumes:
      - ./music:/music
    networks:
      - frontend
      - backend
    mem_limit: 200m
    restart: unless-stopped
    depends_on: #arranque resiliente E9
      db:
        condition: service_healthy
  # ── DB: Redis (almacén de metadatos y playlists) ─────────────────────────
  db:
    image: redis:7-alpine
    container_name: spotesify-db
    command: redis-server --requirepass spotesify123
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD","redis-cli","-a","spotesify123","ping"]
      interval: 5s
      timeout: 3s
      retries: 3
  # ── Worker: Recolector de métricas ───────────────────────────────────────
  worker:
    build: ./worker
    container_name: spotesify-worker
    environment:
      - REDIS_HOST=db
      - REDIS_PORT=6379
      - REDIS_PASS=spotesify123
      - COLLECT_INTERVAL=3000
    networks:
      - backend
    mem_limit: 256m
    restart: unless-stopped
    depends_on: #arranque resiliente E9
      db:
        condition: service_healthy

# ── Redes ────────────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

# ── Volúmenes ────────────────────────────────────────────────────────────────
volumes:
  redis_data:
